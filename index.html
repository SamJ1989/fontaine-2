<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RéApproQR</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
/* === TON DESIGN CONSERVE === */
body{font-family:Arial;background:#f2f4f8;margin:0}
nav{display:flex;background:#111;color:#fff}
nav button{flex:1;padding:12px;border:none;background:none;color:#aaa}
nav .active{color:#fff;background:#007bff}
.page{display:none;padding:15px}
.page.active{display:block}
.card{background:#fff;padding:15px;border-radius:8px;margin-bottom:10px}
button{padding:10px;border:none;background:#007bff;color:#fff;border-radius:6px}
input{padding:8px;width:100%;margin:5px 0}
#qrcanvas{margin-top:10px}
</style>
</head>
<body>

<nav>
<button id="btn-admin" class="active" onclick="showPage('admin')">Admin</button>
<button id="btn-agent" onclick="showPage('agent')">Agent</button>
<button id="btn-history" onclick="showPage('history')">Historique</button>
</nav>

<!-- ADMIN -->
<div id="admin" class="page active">
<div class="card">
<h3>Créer un point</h3>
<input id="name" placeholder="Nom du point">
<input id="site" placeholder="Site">
<input id="floor" placeholder="Étage">
<input id="items" placeholder="Consommables">
<button onclick="createPoint()">Créer + QR</button>
<canvas id="qrcanvas"></canvas>
</div>

<div id="list"></div>
</div>

<!-- AGENT -->
<div id="agent" class="page">
<div id="agentView"></div>
</div>

<!-- HISTORIQUE -->
<div id="history" class="page">
<div id="historyList"></div>
</div>

<script>

// ================= SUPABASE =================
const SUPABASE_URL = "https://wxmdpvuessuwgsgbtovw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR...";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ================= NAV =================
function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
  document.getElementById("btn-"+p).classList.add("active");

  if(p==="admin") renderAdminList();
  if(p==="history") renderHistory();
}

// ================= UTILS =================
const genId = () =>
  'PC-' +
  new Date().toISOString().slice(0,10).replace(/-/g,'') +
  '-' +
  Math.random().toString(36).slice(2,6).toUpperCase();

const fmtDate = iso => new Date(iso).toLocaleString();

// ================= DB =================
async function getPoints(){
  let { data } = await supabase.from("points").select("*");
  let obj={}; (data||[]).forEach(p=>obj[p.id]=p);
  return obj;
}

async function getPassages(){
  let { data } = await supabase.from("passages").select("*");
  return data || [];
}

async function savePoint(p){
  await supabase.from("points").insert([p]);
}

async function savePassage(p){
  await supabase.from("passages").insert([p]);
}

// ================= QR =================
function drawQR(text){
  const c=document.getElementById("qrcanvas");
  const ctx=c.getContext("2d");
  c.width=200;c.height=200;
  ctx.fillStyle="#fff";ctx.fillRect(0,0,200,200);
  ctx.fillStyle="#000";
  ctx.font="10px monospace";
  ctx.fillText("Scanner:",10,20);
  ctx.fillText(text.substring(0,25),10,60);
  ctx.fillText(text.substring(25),10,80);
}

// ================= ADMIN =================
async function createPoint(){
  const p={
    id:genId(),
    name:document.getElementById("name").value,
    site:document.getElementById("site").value,
    floor:document.getElementById("floor").value,
    items:document.getElementById("items").value,
    created:new Date().toISOString()
  };

  await savePoint(p);

  const url = location.origin + location.pathname + "#point=" + p.id;
  drawQR(url);

  renderAdminList();
}

async function renderAdminList(){
  const pts = await getPoints();
  const el = document.getElementById("list");

  el.innerHTML = Object.values(pts).map(p=>`
    <div class="card">
      <b>${p.name}</b><br>
      ${p.site} ${p.floor}<br>
      ${p.id}<br>
      <button onclick="showQR('${p.id}')">QR</button>
    </div>
  `).join("");
}

function showQR(id){
  const url = location.origin + location.pathname + "#point=" + id;
  drawQR(url);
}

// ================= AGENT =================
async function openPoint(id){
  const pts = await getPoints();
  const p = pts[id];
  if(!p) return;

  document.getElementById("agentView").innerHTML = `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.site} ${p.floor}</p>
      <button onclick="submitPassage('${p.id}')">
        Valider passage
      </button>
    </div>
  `;

  showPage("agent");
}

async function submitPassage(pointId){
  await savePassage({
    id:"PAS-"+Date.now(),
    pointId,
    ts:new Date().toISOString()
  });

  alert("✅ Passage enregistré");
}

// ================= HISTORIQUE =================
async function renderHistory(){
  const pss = await getPassages();
  const el = document.getElementById("historyList");

  el.innerHTML = pss.map(p=>`
    <div class="card">
      ${p.pointId}<br>
      ${fmtDate(p.ts)}
    </div>
  `).join("");
}

// ================= HASH (QR) =================
window.addEventListener("load", async ()=>{
  const h = location.hash;

  if(h.startsWith("#point=")){
    const id = h.replace("#point=","");
    await openPoint(id);
  }

  await renderAdminList();
});

</script>

</body>
</html>
